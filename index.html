<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Transformation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    main { max-width: 36rem; text-align: center; }
    h1 { font-size: 2rem; font-weight: 600; margin-bottom: 0.75rem; letter-spacing: -0.02em; }
    p { color: #a3a3a3; line-height: 1.6; margin-bottom: 1.5rem; }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #737373;
      border: 1px solid #262626;
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
    }
  </style>

<body>
  <main>
    <p class="badge">Coming soon</p>
    <h1>AI Transformation</h1>
    <p>Practical frameworks for leaders closing the gap between AI deployment and AI transformation.</p>
